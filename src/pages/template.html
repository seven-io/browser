<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'/>
    <title>Collected Numbers | Sms77</title>

    <link href='https://fonts.googleapis.com/icon?family=Material+Icons' rel='stylesheet'>
    <link href='https://code.getmdl.io/1.3.0/material.green-blue.min.css'
          rel='stylesheet'>

    <style>
        .modalDialog {
            background-color: rgba(0, 0, 0, 0.6);
            bottom: 0;
            left: 0;
            opacity: 0;
            pointer-events: None;
            position: Fixed;
            right: 0;
            top: 0;
            transition: opacity 400ms ease-in;
            z-index: 99999;
        }

        .modalDialog:target {
            opacity: 1;
            pointer-events: Auto;
        }

        .modalDialog > div {
            background-color: #FFFFFF;
            background: linear-gradient(#FFFFFF, #999999);
            border-radius: 10px;
            cursor: Default;
            margin: 10% Auto;
            padding: 5px 20px 13px 20px;
            position: relative;
            width: 400px;
        }

        .close {
            background-color: #606061;
            border-radius: 12px;
            box-shadow: 1px 1px 3px #000000;
            color: #FFFFFF;
            font-weight: Bold;
            line-height: 25px;
            position: Absolute;
            right: -12px;
            text-align: Center;
            text-decoration: None;
            top: -10px;
            width: 24px;
        }

        .close:hover {
            background-color: #00D9FF;
        }
    </style>
</head>

<body>
<div id='root'></div>
</body>
</html>
